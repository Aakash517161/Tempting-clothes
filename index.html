<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STREET HEIGH | Premium Urban Wear</title>
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS VARIABLES & THEMING --- */
        :root {
            --bg-color: #e5e5f0;
            --text-main: #121212;
            --text-muted: #555555;
            --accent: #7a1cff; 
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --blob-1: #ffb6ff;
            --blob-2: #b6ffff;
        }

        [data-theme="dark"] {
            --bg-color: #0a0a0f;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #a855f7; 
            --glass-bg: rgba(20, 20, 25, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --blob-1: #4c1d95;
            --blob-2: #0891b2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Background Blobs */
        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--blob-1); top: -100px; left: -100px; }
        .blob-2 { width: 500px; height: 500px; background: var(--blob-2); bottom: -150px; right: -100px; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* Glassmorphism Utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .nav-icons i {
            font-size: 1.2rem;
            margin-left: 20px;
            cursor: pointer;
            transition: color 0.3s;
        }
        .nav-icons i:hover { color: var(--accent); }
        
        #cart-count {
            background: var(--accent);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 50%;
            position: relative;
            top: -10px;
            left: -10px;
            font-weight: bold;
        }

        /* --- HERO SECTION --- */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px 20px;
        }

        .hero-title {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--text-main), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInDown 1s ease-out;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out 0.2s;
        }

        .widgets-container {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease-out 0.4s;
        }

        @keyframes fadeInDown {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .widget {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .widget i { color: var(--accent); font-size: 1.5rem; }

        /* --- PRODUCTS GRID --- */
        .shop-section {
            padding: 50px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .product-card:hover { transform: translateY(-10px); }

        .product-img {
            width: 100%;
            height: 300px;
            background: rgba(128, 128, 128, 0.1);
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--text-muted);
        }

        .product-title { font-size: 1.2rem; margin-bottom: 5px; }
        .product-price { color: var(--accent); font-weight: 700; font-size: 1.1rem; margin-bottom: 15px;}
        
        button.add-to-cart {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.3s;
        }
        button.add-to-cart:hover { opacity: 0.8; }

        /* --- CART SIDEBAR --- */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px; /* Hidden off screen initially */
            width: 100%;
            max-width: 400px;
            height: 100vh;
            padding: 30px;
            display: flex;
            flex-direction: column;
            transition: right 0.4s ease;
            z-index: 200;
            border-radius: 20px 0 0 20px;
        }

        .cart-sidebar.open { right: 0; }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .close-cart { cursor: pointer; color: var(--text-muted); }
        .close-cart:hover { color: var(--accent); }

        .cart-items { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        .cart-item {
            display: flex;
            justify-content: space-between;
            background: rgba(128, 128, 128, 0.1);
            padding: 10px;
            border-radius: 10px;
        }

        .cart-total {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .checkout-btn {
            background: #25D366; 
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            margin-top: 15px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        /* --- FLOATING WHATSAPP --- */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            z-index: 100;
            text-decoration: none;
            transition: transform 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.1); }

        /* Responsive */
        @media(max-width: 768px) {
            .hero-title { font-size: 3rem; }
            .widgets-container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <!-- Navigation -->
    <nav class="glass">
        <div class="logo">STREET HEIGH</div>
        <div class="nav-icons">
            <i class="fa-solid fa-moon" id="theme-toggle"></i>
            <i class="fa-solid fa-shopping-bag" id="cart-icon">
                <span id="cart-count">0</span>
            </i>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1 class="hero-title">ELEVATE YOUR STREET</h1>
        <p class="hero-subtitle">Premium Urban Wear Designed for the Concrete Jungle</p>

        <!-- Widgets -->
        <div class="widgets-container">
            <div class="widget glass">
                <i class="fa-regular fa-clock"></i>
                <span id="clock-widget">00:00</span>
            </div>
            <div class="widget glass">
                <i class="fa-solid fa-cloud-sun"></i>
                <span id="weather-widget">Loading...</span>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <section class="shop-section">
        <h2 class="section-title">LATEST DROPS</h2>
        <div class="product-grid" id="product-grid">
            <!-- Products injected via JS -->
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div class="cart-sidebar glass" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <i class="fa-solid fa-xmark close-cart" id="close-cart"></i>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Cart items go here -->
        </div>
        <div class="cart-total">
            <span>Total:</span>
            <span id="cart-total-price">$0.00</span>
        </div>
        <a href="#" class="checkout-btn" id="checkout-btn">
            <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
        </a>
    </div>

    <!-- Floating WhatsApp -->
    <a href="https://wa.me/9705117333" target="_blank" class="whatsapp-float">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <!-- JavaScript -->
    <script>
        // --- SAFE INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {

            // --- THEME TOGGLE ---
            const themeToggle = document.getElementById('theme-toggle');
            const body = document.documentElement;

            if(themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const currentTheme = body.getAttribute('data-theme');
                    if (currentTheme === 'dark') {
                        body.setAttribute('data-theme', 'light');
                        themeToggle.classList.replace('fa-moon', 'fa-sun');
                    } else {
                        body.setAttribute('data-theme', 'dark');
                        themeToggle.classList.replace('fa-sun', 'fa-moon');
                    }
                });
            }

            // --- CLOCK WIDGET ---
            const clockWidget = document.getElementById('clock-widget');
            function updateClock() {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                let ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; 
                minutes = minutes < 10 ? '0' + minutes : minutes;
                if(clockWidget) clockWidget.innerText = hours + ':' + minutes + ' ' + ampm;
            }
            setInterval(updateClock, 1000);
            updateClock();

            // --- WEATHER WIDGET ---
            const weatherWidget = document.getElementById('weather-widget');
            function setWeather() {
                const weathers = ['☀️ 24°C Clear', '⛅ 21°C Breezy', '🌧️ 18°C Drizzle', '🌙 19°C Clear Night'];
                const randomWeather = weathers[Math.floor(Math.random() * weathers.length)];
                if(weatherWidget) weatherWidget.innerText = randomWeather;
            }
            setWeather();

            // --- PRODUCT DATA & RENDERING ---
            const products = [
                { id: 1, name: "Oversized Cyber Hoodie", price: 89.99, icon: "fa-solid fa-shirt" },
                { id: 2, name: "Heigh Cargo Pants v2", price: 110.00, icon: "fa-solid fa-person" },
                { id: 3, name: "Street Runner Kicks", price: 145.50, icon: "fa-solid fa-shoe-prints" },
                { id: 4, name: "Urban Visor Shades", price: 35.00, icon: "fa-solid fa-glasses" }
            ];

            const productGrid = document.getElementById('product-grid');
            if(productGrid) {
                products.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card glass';
                    card.innerHTML = `
                        <div class="product-img"><i class="${product.icon}"></i></div>
                        <h3 class="product-title">${product.name}</h3>
                        <p class="product-price">$${product.price.toFixed(2)}</p>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">Add to Cart</button>
                    `;
                    productGrid.appendChild(card);
                });
            }

            // --- CARTING METHOD ---
            window.cart = [];
            const cartSidebar = document.getElementById('cart-sidebar');
            const cartIcon = document.getElementById('cart-icon');
            const closeCart = document.getElementById('close-cart');
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotalPrice = document.getElementById('cart-total-price');
            const checkoutBtn = document.getElementById('checkout-btn');

            if(cartIcon && closeCart && cartSidebar) {
                cartIcon.addEventListener('click', () => cartSidebar.classList.add('open'));
                closeCart.addEventListener('click', () => cartSidebar.classList.remove('open'));
            }

            window.addToCart = function(id) {
                const product = products.find(p => p.id === id);
                const existingItem = window.cart.find(item => item.id === id);
                
                if(existingItem) {
                    existingItem.qty++;
                } else {
                    window.cart.push({ ...product, qty: 1 });
                }
                updateCartUI();
            };

            window.updateCartUI = function() {
                if(!cartItemsContainer) return;
                cartItemsContainer.innerHTML = '';
                let total = 0;
                let count = 0;

                window.cart.forEach((item, index) => {
                    total += item.price * item.qty;
                    count += item.qty;

                    const cartEl = document.createElement('div');
                    cartEl.className = 'cart-item';
                    cartEl.innerHTML = `
                        <div>
                            <h4>${item.name}</h4>
                            <small>$${item.price.toFixed(2)} x ${item.qty}</small>
                        </div>
                        <div style="color: red; cursor:pointer;" onclick="removeFromCart(${index})">
                            <i class="fa-solid fa-trash"></i>
                        </div>
                    `;
                    cartItemsContainer.appendChild(cartEl);
                });

                if(cartCount) cartCount.innerText = count;
                if(cartTotalPrice) cartTotalPrice.innerText = `$${total.toFixed(2)}`;
                updateWhatsAppLink(total);
            };

            window.removeFromCart = function(index) {
                window.cart.splice(index, 1);
                updateCartUI();
            };

            // --- WHATSAPP CHECKOUT INTEGRATION ---
            function updateWhatsAppLink(total) {
                if(!checkoutBtn) return;
                const phoneNumber = "9705117333";
                let message = "Hello STREET HEIGH! I would like to place an order:%0A%0A";
                
                window.cart.forEach(item => {
                    message += `- ${item.qty}x ${item.name} ($${(item.price * item.qty).toFixed(2)})%0A`;
                });
                
                message += `%0A*Total: $${total.toFixed(2)}*%0A%0APlease let me know how to proceed with payment.`;
                checkoutBtn.href = `https://wa.me/${phoneNumber}?text=${message}`;
            }
        });
    </script>
</body>
</html>
